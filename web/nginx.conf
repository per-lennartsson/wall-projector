# Scoped tightly to /api/auth/ (login, signup, refresh) since that's the
# path an attacker would hammer for credential stuffing or brute force —
# 5 req/s per IP with a small burst is generous for real usage but blunts
# scripted attempts. This directive belongs at the http{} level; it works
# here because the base image's nginx.conf does
# `include /etc/nginx/conf.d/*.conf;` directly inside its http{} block.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Baseline hardening headers. CSP allows 'unsafe-inline' for style-src
  # because React's inline `style={{...}}` attributes (used throughout for
  # per-image transforms) count as inline styles under CSP; tightening that
  # further would need a nonce-based rewrite, out of scope here. img-src
  # allows data:/http(s): because photos are stored as base64 data URLs and
  # the app also supports adding images by remote URL.
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: http: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  # Harmless if this origin is ever served over plain HTTP (browsers only
  # honor HSTS on responses received over HTTPS) — becomes effective as soon
  # as TLS is terminated in front of this container.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # SPA fallback — client-side routing (login/signup/project/:id) needs
  # every path to resolve to index.html so react-router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Single browser-facing origin: the frontend only ever calls same-origin
  # /api/... paths, nginx proxies them to the FastAPI service. Avoids CORS
  # entirely in this deployment (the api's CORS middleware is only for the
  # separate Vite dev server origin during local development).
  location /api/ {
    # Default (1m) is too small for a project payload carrying several
    # base64-encoded photos inline (the accepted tradeoff of storing images
    # as base64 rather than object storage — see CLAUDE.md). 64m comfortably
    # covers a wall full of images; raise further if that's still too tight.
    client_max_body_size 64m;
    proxy_pass http://api:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path /api/auth /api/auth;
  }

  # More specific prefix wins over /api/ above — rate-limited to blunt
  # credential-stuffing / brute-force against login, signup, and refresh.
  location /api/auth/ {
    limit_req zone=auth_limit burst=10 nodelay;
    client_max_body_size 1m;
    proxy_pass http://api:8000/api/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path /api/auth /api/auth;
  }
}
