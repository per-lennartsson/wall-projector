# Phase 0/1 checkpoint only: runs the new React+FastAPI stack side-by-side
# with the still-authoritative vanilla-JS app (docker-compose.yml, port
# 8080), on different ports, for review before it replaces anything.
services:
  wall-projector-web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://wallprojector:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/wallprojector
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — see .env.example}
    depends_on:
      postgres:
        condition: service_healthy
    # No host port mapping: the browser only ever talks to nginx
    # (wall-projector-web), which proxies /api/ to this service over the
    # compose network. Publishing 8000 directly would bypass nginx's request
    # size limit and let anyone on the host network hit the API unproxied.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallprojector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: wallprojector
    volumes:
      - wall-projector-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallprojector"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  wall-projector-pgdata:
